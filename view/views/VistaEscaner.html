<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Control - Municipalidad de Yerbas Buenas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-main-content d-flex flex-column vh-100">

    <nav class="navbar bg-white border-bottom shadow-sm px-4 py-3">
        <div class="d-flex align-items-center">
            <i class="bi bi-building text-danger-yb fs-2 me-3"></i>
            <div>
                <h5 class="mb-0 fw-bold text-blue-yb">I. Municipalidad de Yerbas Buenas</h5>
                <small class="text-muted">Sistema de Control de Asistencia</small>
            </div>
        </div>
        <a href="VistaLogin.html" class="btn btn-outline-danger btn-sm fw-bold">
            <i class="bi bi-box-arrow-left me-1"></i> Salir del Terminal
        </a>
    </nav>

    <main class="flex-grow-1 d-flex flex-column justify-content-center align-items-center p-4">
        
        <div class="text-center mb-5">
            <div id="reloj-digital" class="display-1 fw-bold text-blue-yb" style="font-variant-numeric: tabular-nums;">
                00:00:00
            </div>
            <h4 id="fecha-actual" class="text-muted fw-semibold mt-2">Cargando fecha...</h4>
        </div>

        <div class="card border-0 shadow-lg p-4 p-md-5 mb-4 text-center" style="max-width: 600px; width: 100%; border-top: 8px solid var(--yb-blue) !important;">
            <h4 class="text-black fw-bold mb-4">Pase su credencial por el lector</h4>
            
            <div class="input-group input-group-lg mb-4">
                <span class="input-group-text bg-light text-primary"><i class="bi bi-upc-scan fs-4"></i></span>
                <input type="text" id="input-escaner" class="form-control text-center fw-bold fs-4" placeholder="Esperando lectura..." autofocus autocomplete="off">
            </div>

            <div id="resultado-escaneo" class="d-none">
                <hr class="my-4 text-muted">
                
                <div id="alerta-registro" class="alert alert-success fw-bold py-2 mb-4 fs-5 border-0 shadow-sm">
                    <i class="bi bi-check-circle-fill me-2"></i> ¡Entrada Registrada!
                </div>

                <div class="row text-start g-3">
                    <div class="col-12 d-flex align-items-center mb-2">
                        <i class="bi bi-person-badge fs-1 text-muted me-3"></i>
                        <div>
                            <small class="text-muted fw-bold text-uppercase">Funcionario</small>
                            <h3 id="res-nombre" class="text-black fw-bold mb-0">Juan Pérez González</h3>
                            <span id="res-rut" class="badge bg-secondary">12345678-9</span>
                        </div>
                    </div>
                    
                    <div class="col-6">
                        <div class="p-3 bg-light rounded border">
                            <small class="text-muted fw-bold d-block mb-1">Hora de Registro</small>
                            <h4 id="res-hora" class="text-blue-yb fw-bold mb-0">08:14 AM</h4>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="p-3 bg-light rounded border">
                            <small class="text-muted fw-bold d-block mb-1">Turno Asignado</small>
                            <h5 id="res-turno" class="text-black fw-bold mb-0">Diurno</h5>
                            <small id="res-horario" class="text-muted">08:00 - 17:00</small>
                        </div>
                    </div>
                </div>
            </div>
            </div>
    </main>

    <script src="../../assets/js/script.js"></script>
</body>
</html>
